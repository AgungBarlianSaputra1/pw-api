<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen User & Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased minimal-h-screen">

    <div id="app" class="container mx-auto p-4 max-w-6xl">
        <div id="global-loader" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
        </div>

        <div id="view-login" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-md hidden">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Masuk ke Sistem</h2>
            <div id="login-alert" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="login-username" required class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" required class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg font-semibold transition">Login</button>
            </form>
            <p class="text-xs text-center text-gray-500 mt-4">Hint: admin / admin123</p>
        </div>

        <div id="view-dashboard" class="hidden space-y-6">
            <nav class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center flex-wrap gap-4">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid stroke-amber-500 fa-users text-blue-600 text-2xl"></i>
                    <span class="text-xl font-bold text-gray-800">UserManagement</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-session-name" class="text-gray-600 font-medium"></span>
                    <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 transition">
                        <i class="fa-solid fa-sign-out-alt"></i> Keluar
                    </button>
                </div>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm h-fit">
                    <h3 id="form-title" class="text-lg font-bold text-gray-800 mb-4">Tambah User Baru</h3>
                    <form id="form-user" class="space-y-4">
                        <input type="hidden" id="user-id">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Username</label>
                            <input type="text" id="user-username" required class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                            <input type="text" id="user-name" required class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="user-email" required class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Role</label>
                            <select id="user-role" class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="User">User</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                        <div class="flex space-x-2 pt-2">
                            <button type="submit" id="btn-submit-user" class="flex-1 bg-green-600 hover:bg-green-700 text-white p-2 rounded-lg font-medium transition">Simpan</button>
                            <button type="button" id="btn-cancel-edit" class="hidden flex-1 bg-gray-300 hover:bg-gray-400 text-gray-700 p-2 rounded-lg font-medium transition">Batal</button>
                        </div>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm overflow-hidden">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Daftar Pengguna</h3>
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm uppercase">
                                    <th class="p-3">Username</th>
                                    <th class="p-3">Nama</th>
                                    <th class="p-3">Email</th>
                                    <th class="p-3">Role</th>
                                    <th class="p-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm text-gray-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. INITIAL SEED DATA (Menciptakan users.json di LocalStorage)
        // ==========================================
        const DEFAULT_USERS = [
            { id: 1, username: "admin", name: "Administrator", email: "admin@mail.com", role: "Admin", password: "admin123" },
            { id: 2, username: "johndoe", name: "John Doe", email: "john@mail.com", role: "User", password: "user123" }
        ];

        if (!localStorage.getItem('mock_users_json')) {
            localStorage.setItem('mock_users_json', JSON.stringify(DEFAULT_USERS));
        }

        // ==========================================
        // 2. API SERVICE (Menggunakan Fetch Interceptor / Mock)
        // Scalable: Jika nanti ganti ke backend asli, cukup ubah fungsi fetch di sini saja.
        // ==========================================
        const ApiService = {
            async request(endpoint, options = {}) {
                document.getElementById('global-loader').classList.remove('hidden');
                
                // Simulasi network latency 300ms agar terasa real-world
                await new Promise(resolve => setTimeout(resolve, 300));

                try {
                    let database = JSON.parse(localStorage.getItem('mock_users_json'));
                    const { method = 'GET', body } = options;

                    // Menggunakan Fetch bayangan (Mocking Response)
                    if (endpoint === '/api/login' && method === 'POST') {
                        const payload = JSON.parse(body);
                        const user = database.find(u => u.username === payload.username && u.password === payload.password);
                        if (user) {
                            return new Response(JSON.stringify({ success: true, user: { username: user.username, name: user.name } }), { status: 200 });
                        }
                        return new Response(JSON.stringify({ success: false, message: "Username atau Password salah!" }), { status: 401 });
                    }

                    if (endpoint === '/api/users') {
                        if (method === 'GET') {
                            return new Response(JSON.stringify(database), { status: 200 });
                        }
                        if (method === 'POST') {
                            const newUser = JSON.parse(body);
                            newUser.id = Date.now(); // Simple ID generation
                            newUser.password = "default123"; // default password untuk user baru
                            database.push(newUser);
                            localStorage.setItem('mock_users_json', JSON.stringify(database));
                            return new Response(JSON.stringify(newUser), { status: 201 });
                        }
                    }

                    if (endpoint.startsWith('/api/users/')) {
                        const id = parseInt(endpoint.split('/').pop());
                        const index = database.findIndex(u => u.id === id);

                        if (method === 'PUT') {
                            const updatedData = JSON.parse(body);
                            database[index] = { ...database[index], ...updatedData };
                            localStorage.setItem('mock_users_json', JSON.stringify(database));
                            return new Response(JSON.stringify(database[index]), { status: 200 });
                        }
                        if (method === 'DELETE') {
                            database.splice(index, 1);
                            localStorage.setItem('mock_users_json', JSON.stringify(database));
                            return new Response(JSON.stringify({ success: true }), { status: 200 });
                        }
                    }

                    return new Response(JSON.stringify({ message: "Not Found" }), { status: 404 });
                } catch (error) {
                    console.error("API Error: ", error);
                } finally {
                    document.getElementById('global-loader').classList.add('hidden');
                }
            }
        };

        // ==========================================
        // 3. STATE MANAGEMENT
        // Konsisten & Terpusat
        // ==========================================
        const AppState = {
            currentUser: JSON.parse(sessionStorage.getItem('session_user')) || null,
            users: [],
            
            setSession(user) {
                this.currentUser = user;
                if (user) sessionStorage.setItem('session_user', JSON.stringify(user));
                else sessionStorage.removeItem('session_user');
                AppUI.route();
            },

            async fetchUsers() {
                const res = await ApiService.request('/api/users');
                this.users = await res.json();
                AppUI.renderTable(this.users);
            }
        };

        // ==========================================
        // 4. UI RENDERER & ROUTER
        // Modular & Responsif
        // ==========================================
        const AppUI = {
            views: {
                login: document.getElementById('view-login'),
                dashboard: document.getElementById('view-dashboard')
            },

            route() {
                if (AppState.currentUser) {
                    this.views.login.classList.add('hidden');
                    this.views.dashboard.classList.remove('hidden');
                    document.getElementById('user-session-name').innerText = `Halo, ${AppState.currentUser.name}`;
                    AppState.fetchUsers();
                } else {
                    this.views.login.classList.remove('hidden');
                    this.views.dashboard.classList.add('hidden');
                }
            },

            renderTable(users) {
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = users.map(user => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 font-medium text-gray-900">${user.username}</td>
                        <td class="p-3">${user.name}</td>
                        <td class="p-3 text-gray-500">${user.email}</td>
                        <td class="p-3">
                            <span class="px-2 py-1 text-xs font-semibold rounded-full ${user.role === 'Admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
                                ${user.role}
                            </span>
                        </td>
                        <td class="p-3 text-center space-x-2 whitespace-nowrap">
                            <button onclick="AppUI.handleEditClick(${user.id})" class="text-blue-600 hover:text-blue-900 p-1 transition" title="Edit">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button onclick="AppUI.handleDeleteClick(${user.id})" class="text-red-600 hover:text-red-900 p-1 transition" title="Hapus">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            },

            handleEditClick(id) {
                const user = AppState.users.find(u => u.id === id);
                if (!user) return;

                document.getElementById('user-id').value = user.id;
                document.getElementById('user-username').value = user.username;
                document.getElementById('user-username').disabled = true; // Username idealnya tidak diubah
                document.getElementById('user-name').value = user.name;
                document.getElementById('user-email').value = user.email;
                document.getElementById('user-role').value = user.role;

                document.getElementById('form-title').innerText = "Edit Data User";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
            },

            resetForm() {
                document.getElementById('form-user').reset();
                document.getElementById('user-id').value = '';
                document.getElementById('user-username').disabled = false;
                document.getElementById('form-title').innerText = "Tambah User Baru";
                document.getElementById('btn-cancel-edit').classList.add('hidden');
            },

            async handleDeleteClick(id) {
                if (confirm('Apakah Anda yakin ingin menghapus user ini?')) {
                    await ApiService.request(`/api/users/${id}`, { method: 'DELETE' });
                    AppState.fetchUsers();
                    this.resetForm();
                }
            }
        };

        // ==========================================
        // 5. EVENT HANDLERS (Konektor Antara UI dan State)
        // DRY Principle Terjaga di sini
        // ==========================================
        
        // Handle Form Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const alertBox = document.getElementById('login-alert');

            const res = await ApiService.request('/api/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                alertBox.classList.add('hidden');
                document.getElementById('form-login').reset();
                AppState.setSession(data.user);
            } else {
                alertBox.innerText = data.message;
                alertBox.classList.remove('hidden');
            }
        });

        // Handle Logout
        document.getElementById('btn-logout').addEventListener('click', () => {
            AppState.setSession(null);
        });

        // Handle Create / Update User (REUSE FORM)
        document.getElementById('form-user').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            
            const payload = {
                username: document.getElementById('user-username').value,
                name: document.getElementById('user-name').value,
                email: document.getElementById('user-email').value,
                role: document.getElementById('user-role').value
            };

            if (id) {
                // Mode Update (PUT)
                await ApiService.request(`/api/users/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
            } else {
                // Mode Create (POST)
                await ApiService.request('/api/users', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
            }

            AppState.fetchUsers();
            AppUI.resetForm();
        });

        // Tombol Batal Edit
        document.getElementById('btn-cancel-edit').addEventListener('click', () => AppUI.resetForm());

        // INITIAL LOAD / RUNTIME ENTRY POINT
        AppUI.route();

    </script>
</body>
</html>
